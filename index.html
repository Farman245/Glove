<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فارمان برادرز - فیکٹری مینجمنٹ سسٹم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Arabic', sans-serif; background-color: #f1f5f9; overflow-x: hidden; }
        
        /* پرنٹ کی سیٹنگز */
        @media print { 
            .no-print { display: none !important; } 
            body { background-color: white; } 
            .print-table { width: 100%; border-collapse: collapse; } 
            .print-table th, .print-table td { border: 1px solid #cbd5e1; padding: 10px; text-align: right; font-size: 14px;} 
            .sidebar-open { margin-right: 0 !important; }
        }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* کسٹم سکرول بار */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- فائر بیس کنفیگریشن ---
        const firebaseConfig = {
            apiKey: "AIzaSyCa8tzZCqksEMIngMoC0F0k4DhNgA0lkzs",
            authDomain: "factory-a3ca2.firebaseapp.com",
            projectId: "factory-a3ca2",
            storageBucket: "factory-a3ca2.firebasestorage.app",
            messagingSenderId: "523923910997",
            appId: "1:523923910997:web:6b7b1e93e80577092dbfdc"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'glove-factory-app';

        const gloveVarieties = ['سمال ہاف', 'میڈیم ہاف', 'لارج ہاف', 'سمال فل', 'میڈیم فل', 'لارج فل'];

        // ==========================================
        // 1. مرکزی ایپ کمپوننٹ
        // ==========================================
        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activePage, setActivePage] = useState('dashboard');
            const [selectedMonth, setSelectedMonth] = useState(new Date().toISOString().slice(0, 7));
            const [toast, setToast] = useState('');
            
            const isMobileInit = window.innerWidth < 768;
            const [isSidebarOpen, setIsSidebarOpen] = useState(!isMobileInit);

            const [dbData, setDbData] = useState({
                warehouse: [], yarn: [], production: [], packing: [], machine: [], salary: [], investment: [], transferPacking: [], jobWorkIncome: []
            });

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => { setUser(u); setLoading(false); });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const collections = ['warehouse', 'yarn', 'production', 'packing', 'machine', 'salary', 'investment', 'transferPacking', 'jobWorkIncome'];
                
                const unsubscribes = collections.map(col => {
                    return db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(col)
                        .onSnapshot(snap => {
                            const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            data.sort((a, b) => new Date(b.date) - new Date(a.date));
                            setDbData(prev => ({ ...prev, [col]: data }));
                        });
                });
                return () => unsubscribes.forEach(u => u());
            }, [user]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
            const showToast = (m) => { setToast(m); setTimeout(() => setToast(''), 3000); };

            const handleMenuClick = (id) => {
                setActivePage(id);
                if (window.innerWidth < 768) {
                    setIsSidebarOpen(false);
                }
            };

            if (loading) return <div className="h-screen flex items-center justify-center"><div className="w-10 h-10 border-4 border-emerald-600 border-t-transparent rounded-full animate-spin"></div></div>;
            if (!user) return <LoginScreen auth={auth} />;

            const menuItems = [
                { id: 'dashboard', label: 'ڈیش بورڈ', icon: 'layout-dashboard' },
                { id: 'entry', label: 'ڈیٹا انٹری کریں', icon: 'plus-circle' },
                { id: 'records', label: 'تمام ریکارڈز دیکھیں', icon: 'list' },
                { id: 'settlement', label: 'حساب کتاب (منافع)', icon: 'pie-chart' },
                { id: 'investment', label: 'سرمایہ کاری', icon: 'briefcase' }
            ];

            return (
                <div className="flex h-screen overflow-hidden bg-gray-50">
                    {/* موبائل اوورلے */}
                    {isSidebarOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 z-30 md:hidden transition-opacity" onClick={() => setIsSidebarOpen(false)}></div>
                    )}

                    {/* سائیڈ بار */}
                    <aside className={`fixed md:relative top-0 right-0 h-full bg-emerald-900 text-white transition-transform duration-300 flex flex-col no-print z-40 shadow-2xl 
                        ${isSidebarOpen ? 'translate-x-0 w-64' : 'translate-x-full md:translate-x-0 md:w-20'}`}>
                        
                        <div className="p-4 flex items-center justify-between border-b border-emerald-800">
                            {isSidebarOpen && <h1 className="font-bold text-lg whitespace-nowrap overflow-hidden">فارمان برادرز</h1>}
                            <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 bg-emerald-800 rounded-lg hover:bg-emerald-700 hidden md:block">
                                <i data-lucide="menu" className="w-5 h-5"></i>
                            </button>
                            <button onClick={() => setIsSidebarOpen(false)} className="p-2 bg-emerald-800 rounded-lg hover:bg-emerald-700 md:hidden">
                                <i data-lucide="x" className="w-5 h-5"></i>
                            </button>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto py-4 space-y-1">
                            {menuItems.map(item => (
                                <button key={item.id} onClick={() => handleMenuClick(item.id)} className={`w-full flex items-center px-4 py-3 transition-colors ${activePage === item.id ? 'bg-emerald-700 border-r-4 border-emerald-400' : 'hover:bg-emerald-800 border-r-4 border-transparent'}`} title={item.label}>
                                    <i data-lucide={item.icon} className="min-w-[24px]"></i>
                                    {isSidebarOpen && <span className="mr-3 whitespace-nowrap">{item.label}</span>}
                                </button>
                            ))}
                        </div>

                        <div className="p-4 border-t border-emerald-800">
                            <div className="flex items-center gap-3">
                                <img src={user.photoURL || 'https://via.placeholder.com/40'} className="w-10 h-10 rounded-full border-2 border-emerald-500" />
                                {isSidebarOpen && (
                                    <div className="overflow-hidden">
                                        <p className="text-sm font-bold truncate">{user.displayName || 'یوزر'}</p>
                                        <button onClick={() => auth.signOut()} className="text-xs text-emerald-300 hover:text-white">لاگ آؤٹ کریں</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </aside>

                    {/* مرکزی حصہ */}
                    <div className="flex-1 flex flex-col min-w-0 overflow-hidden relative">
                        <header className="bg-white shadow-sm p-3 md:p-4 flex justify-between items-center z-20 no-print sticky top-0">
                            <div className="flex items-center gap-3">
                                <button onClick={() => setIsSidebarOpen(true)} className="p-2 text-gray-600 hover:bg-gray-100 rounded-lg md:hidden">
                                    <i data-lucide="menu" className="w-6 h-6"></i>
                                </button>
                                <h2 className="text-lg md:text-xl font-bold text-gray-800 truncate">
                                    {menuItems.find(m => m.id === activePage)?.label}
                                </h2>
                            </div>
                            <div className="flex items-center gap-2 md:gap-3">
                                <input type="month" value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)} className="border border-gray-300 px-2 md:px-3 py-1.5 md:py-2 rounded-lg text-sm outline-none focus:border-emerald-500 bg-gray-50 w-[120px] md:w-auto" />
                                <button onClick={() => window.print()} className="bg-gray-100 p-2 rounded-lg hover:bg-gray-200 text-gray-700 hidden md:block" title="پرنٹ کریں">
                                    <i data-lucide="printer" className="w-5 h-5"></i>
                                </button>
                            </div>
                        </header>

                        <main className="flex-1 overflow-y-auto p-3 md:p-6 print:p-0">
                            <div className="fade-in max-w-6xl mx-auto pb-20 md:pb-0">
                                {activePage === 'dashboard' && <DashboardPage dbData={dbData} month={selectedMonth} />}
                                {activePage === 'entry' && <EntryPage db={db} user={user} appId={appId} showToast={showToast} gloveVarieties={gloveVarieties} />}
                                {activePage === 'records' && <RecordsPage dbData={dbData} db={db} user={user} appId={appId} month={selectedMonth} showToast={showToast} setActivePage={setActivePage} />}
                                {activePage === 'settlement' && <SettlementPage dbData={dbData} month={selectedMonth} />}
                                {activePage === 'investment' && <InvestmentPage dbData={dbData} db={db} user={user} appId={appId} showToast={showToast} />}
                            </div>
                        </main>
                    </div>

                    {toast && <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl z-50 text-sm font-bold flex items-center gap-2"><i data-lucide="check-circle" className="text-emerald-400 w-5 h-5"></i> {toast}</div>}
                </div>
            );
        }

        // ==========================================
        // 2. لاگ ان سکرین
        // ==========================================
        function LoginScreen({ auth }) {
            const [errorMsg, setErrorMsg] = useState('');
            const loginWithGoogle = () => {
                setErrorMsg('');
                const provider = new firebase.auth.GoogleAuthProvider();
                auth.signInWithPopup(provider).catch(err => setErrorMsg(err.message));
            };

            return (
                <div className="h-screen flex flex-col items-center justify-center bg-gray-100 p-4">
                    <div className="bg-white p-6 md:p-10 rounded-3xl shadow-xl text-center max-w-md w-full border-t-8 border-emerald-600">
                        <div className="w-16 h-16 md:w-20 md:h-20 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-4 border border-emerald-100">
                            <i data-lucide="factory" className="text-emerald-600 w-8 h-8 md:w-10 md:h-10"></i>
                        </div>
                        <h1 className="text-xl md:text-2xl font-black text-gray-800 mb-2">فیکٹری مینجمنٹ ٹول</h1>
                        <button onClick={loginWithGoogle} className="w-full mt-6 flex items-center justify-center gap-3 bg-white border-2 border-gray-200 py-3 rounded-xl font-bold text-gray-700 hover:bg-gray-50 transition">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-5 h-5 md:w-6 md:h-6" /> گوگل اکاؤنٹ سے لاگ ان کریں
                        </button>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 3. ڈیش بورڈ پیج
        // ==========================================
        function DashboardPage({ dbData, month }) {
            const stats = useMemo(() => {
                const filterMonth = (list) => list.filter(i => i.date?.startsWith(month));
                const mProd = filterMonth(dbData.production);
                const mPack = filterMonth(dbData.packing);
                const mMach = filterMonth(dbData.machine);
                const mSal = filterMonth(dbData.salary);
                const mTrans = filterMonth(dbData.transferPacking);
                const mJob = filterMonth(dbData.jobWorkIncome);
                
                return {
                    whBags: dbData.warehouse.reduce((s, i) => s + (i.bags || 0), 0) - dbData.yarn.reduce((s, i) => s + (i.bags || 0), 0),
                    whWeight: dbData.warehouse.reduce((s, i) => s + (i.totalWeight || 0), 0) - dbData.yarn.reduce((s, i) => s + (i.weight || 0), 0),
                    prodDoz: mProd.reduce((s, i) => s + (i.dozens || 0), 0),
                    prodWeight: mProd.reduce((s, i) => s + (i.weight || 0), 0),
                    packDoz: mPack.reduce((s, i) => s + (i.dozens || 0), 0),
                    transDoz: mTrans.reduce((s, i) => s + (i.dozens || 0), 0),
                    totalExp: mPack.reduce((s, i) => s + (i.cost || 0), 0) + mMach.reduce((s, i) => s + (i.cost || 0), 0) + mSal.reduce((s, i) => s + (i.amount || 0), 0),
                    totalInv: dbData.investment.reduce((s, i) => s + (i.amount || 0), 0),
                    jobIncome: mJob.reduce((s, i) => s + (i.amount || 0), 0)
                };
            }, [dbData, month]);

            return (
                <div className="space-y-4 md:space-y-6">
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
                        <StatCard title="گودام سٹاک" val={`${stats.whBags} بورے`} sub={`${stats.whWeight} کلو`} icon="home" color="bg-indigo-600" />
                        <StatCard title="ماہانہ پروڈکشن" val={`${stats.prodDoz} درجن`} sub={`${stats.prodWeight} کلو`} icon="box" color="bg-emerald-600" />
                        <StatCard title="کل مزدوری بلنگ (اس ماہ)" val={`Rs ${stats.jobIncome.toLocaleString()}`} sub="مزدوری سے آمدنی" icon="banknote" color="bg-blue-600" />
                        <StatCard title="ماہانہ کل خرچہ" val={`Rs ${stats.totalExp.toLocaleString()}`} sub="بل + تنخواہ + پیکنگ" icon="trending-down" color="bg-red-600" />
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-6 mt-4 md:mt-6">
                        <div className="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-gray-100">
                            <h3 className="font-bold text-base md:text-lg mb-4 flex items-center gap-2"><i data-lucide="pie-chart" className="text-gray-400 w-5 h-5"></i> فیکٹری کی مجموعی پوزیشن</h3>
                            <div className="space-y-3 md:space-y-4 text-sm md:text-base">
                                <div className="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                                    <span className="text-gray-600">کل سرمایہ کاری (دونوں پارٹنرز)</span>
                                    <span className="font-bold text-emerald-700">Rs {stats.totalInv.toLocaleString()}</span>
                                </div>
                                <div className="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                                    <span className="text-gray-600">پیکنگ گودام روانگی (اس ماہ)</span>
                                    <span className="font-bold text-teal-600">{stats.transDoz.toFixed(2)} درجن</span>
                                </div>
                                <div className="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                                    <span className="text-gray-600">فیکٹری میں موجود ان پیک مال</span>
                                    <span className="font-bold text-orange-600">{(stats.prodDoz - stats.transDoz).toFixed(2)} درجن</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 4. انٹری پیج
        // ==========================================
        function EntryPage({ db, user, appId, showToast, gloveVarieties }) {
            const [entryType, setEntryType] = useState('production');

            const handleSave = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData.entries());
                const numFields = ['bags', 'weight', 'weightPerBag', 'dozens', 'cost', 'amount', 'totalWeight'];
                Object.keys(data).forEach(k => { if (numFields.includes(k)) data[k] = parseFloat(data[k]) || 0; });
                if (entryType === 'warehouse') data.totalWeight = (data.bags || 0) * (data.weightPerBag || 30);

                try {
                    await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(entryType).add({ ...data, timestamp: Date.now() });
                    showToast("ریکارڈ محفوظ ہو گیا!");
                    e.target.reset();
                } catch (err) { showToast("ایرر: محفوظ نہیں ہو سکا"); }
            };

            const entryOptions = [
                { id: 'jobWorkIncome', label: 'مزدوری بلنگ', color: 'blue' },
                { id: 'production', label: 'پروڈکشن', color: 'emerald' },
                { id: 'transferPacking', label: 'پیکنگ روانگی', color: 'teal' },
                { id: 'yarn', label: 'دھاگہ آمد', color: 'amber' },
                { id: 'machine', label: 'مشین خرچہ', color: 'red' },
                { id: 'salary', label: 'تنخواہ', color: 'indigo' },
                { id: 'packing', label: 'پیکنگ خرچہ', color: 'purple' }
            ];

            return (
                <div className="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-gray-100 max-w-3xl mx-auto">
                    <div className="flex flex-wrap gap-2 mb-6 md:mb-8 justify-center bg-gray-50 p-2 rounded-xl border">
                        {entryOptions.map(t => (
                            <button key={t.id} onClick={() => setEntryType(t.id)} className={`px-2 py-2 md:px-4 rounded-lg text-xs md:text-sm font-bold flex-grow text-center transition-all ${entryType === t.id ? `bg-${t.color}-600 text-white shadow-md` : 'text-gray-500 hover:bg-gray-200'}`}>
                                {t.label}
                            </button>
                        ))}
                    </div>

                    <form onSubmit={handleSave} className="space-y-4 md:space-y-6">
                        <div>
                            <label className="text-xs md:text-sm font-bold text-gray-500 mb-1 block">تاریخ درج کریں</label>
                            <input type="date" name="date" required defaultValue={new Date().toISOString().split('T')[0]} className="w-full p-3 md:p-4 border border-gray-300 rounded-xl bg-gray-50 outline-none text-sm md:text-base" />
                        </div>

                        {entryType === 'jobWorkIncome' && (
                            <div className="space-y-4">
                                <input type="text" name="partyName" placeholder="پارٹی کا نام (کس کا مال ہے؟)" required className="w-full p-3 md:p-4 border border-gray-300 rounded-xl text-sm md:text-base" />
                                <div className="grid grid-cols-2 gap-4">
                                    <input type="text" name="details" placeholder="تفصیل / ورائٹی" required className="w-full p-3 md:p-4 border border-gray-300 rounded-xl text-sm md:text-base" />
                                    <input type="number" name="amount" placeholder="کل بل کی رقم" required className="w-full p-3 md:p-4 border border-gray-300 rounded-xl text-sm md:text-base" />
                                </div>
                            </div>
                        )}

                        {entryType === 'warehouse' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <input type="number" name="bags" placeholder="کتنے بورے آئے؟" required className="w-full p-3 md:p-4 border border-gray-300 rounded-xl text-sm md:text-base" />
                                <input type="number" name="weightPerBag" placeholder="فی بوری وزن (کلو)" defaultValue="30" className="w-full p-3 md:p-4 border border-gray-300 rounded-xl text-sm md:text-base" />
                            </div>
                        )}

                        {(entryType === 'production' || entryType === 'packing' || entryType === 'transferPacking') && (
                            <div className="space-y-4">
                                <select name="variety" className="w-full p-3 md:p-4 border border-gray-300 rounded-xl bg-gray-50 text-sm md:text-base">
                                    {gloveVarieties.map(v => <option key={v} value={v}>{v}</option>)}
                                </select>
                                <div className="grid grid-cols-2 gap-4">
                                    <input type="number" name="dozens" placeholder="درجن" required className="w-full p-3 md:p-4 border border-gray-300 rounded-xl text-sm md:text-base" />
                                    {entryType === 'production' && <input type="number" name="weight" placeholder="وزن" required className="w-full p-3 md:p-4 border border-gray-300 rounded-xl text-sm md:text-base" />}
                                    {entryType === 'packing' && <input type="number" name="cost" placeholder="خرچہ (میری جیب سے)" required className="w-full p-3 md:p-4 border border-gray-300 rounded-xl text-sm md:text-base" />}
                                    {entryType === 'transferPacking' && <input type="text" name="details" placeholder="تفصیل (اگر کوئی ہے)" className="w-full p-3 md:p-4 border border-gray-300 rounded-xl text-sm md:text-base" />}
                                </div>
                            </div>
                        )}

                        {entryType === 'yarn' && (
                            <div className="grid grid-cols-2 gap-4">
                                <input type="number" name="bags" placeholder="بورے" required className="w-full p-3 md:p-4 border border-gray-300 rounded-xl text-sm md:text-base" />
                                <input type="number" name="weight" placeholder="کل وزن" required className="w-full p-3 md:p-4 border border-gray-300 rounded-xl text-sm md:text-base" />
                            </div>
                        )}

                        {entryType === 'machine' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <input type="number" name="cost" placeholder="خرچہ کی رقم" required className="w-full p-3 md:p-4 border border-gray-300 rounded-xl text-sm md:text-base" />
                                <input type="text" name="details" placeholder="تفصیل (بل، پرزہ وغیرہ)" required className="w-full p-3 md:p-4 border border-gray-300 rounded-xl text-sm md:text-base" />
                            </div>
                        )}

                        {entryType === 'salary' && (
                            <div className="space-y-4">
                                <input type="text" name="workerName" placeholder="کاریگر کا نام" required className="w-full p-3 md:p-4 border border-gray-300 rounded-xl text-sm md:text-base" />
                                <div className="grid grid-cols-2 gap-4">
                                    <input type="number" name="amount" placeholder="رقم" required className="w-full p-3 md:p-4 border border-gray-300 rounded-xl text-sm md:text-base" />
                                    <select name="salaryType" className="w-full p-3 md:p-4 border border-gray-300 rounded-xl text-sm md:text-base"><option value="تنخواہ">تنخواہ</option><option value="ایڈوانس">ایڈوانس</option></select>
                                </div>
                            </div>
                        )}

        // ==========================================
        // 6. منافع کا حساب پیج (نئی پارٹنرشپ سیٹنگ)
        // ==========================================
        function SettlementPage({ dbData, month }) {
            const settlement = useMemo(() => {
                const filterMonth = (list) => list.filter(i => i.date?.startsWith(month));
                
                // آمدنی (مزدوری بل)
                const totalIncome = filterMonth(dbData.jobWorkIncome).reduce((s, i) => s + (i.amount || 0), 0);
                
                // خرچے جو فارمان بھائی نے جیب سے دیے (تنخواہ، مشین، پیکنگ)
                const mPack = filterMonth(dbData.packing).reduce((s, i) => s + (i.cost || 0), 0);
                const mMach = filterMonth(dbData.machine).reduce((s, i) => s + (i.cost || 0), 0);
                const mSal = filterMonth(dbData.salary).reduce((s, i) => s + (i.amount || 0), 0);
                const totalExpense = mPack + mMach + mSal;
                
                // خالص منافع
                const netProfit = totalIncome - totalExpense;
                
                // تقسیم (50-50)
                const partnerShare = netProfit > 0 ? netProfit / 2 : (netProfit / 2);
                const farmanShare = netProfit > 0 ? netProfit / 2 : (netProfit / 2);
                
                // فارمان بھائی کی کل وصولی (منافع + جیب سے دیے گئے خرچوں کی واپسی)
                const farmanTotalReclaim = farmanShare + totalExpense;

                return { totalIncome, totalExpense, netProfit, partnerShare, farmanShare, farmanTotalReclaim };
            }, [dbData, month]);

            return (
                <div className="space-y-6">
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 text-center">
                        <h2 className="text-xl font-black text-gray-800 mb-2">ماہانہ کھاتہ (منافع اور خرچ)</h2>
                        <p className="text-gray-500 text-sm">اس ماہ کی کل آمدنی، خرچ اور پارٹنرز کے حصے کی تفصیل</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-blue-50 border border-blue-200 p-6 rounded-2xl text-center">
                            <p className="text-blue-800 font-bold mb-2">کل آمدنی (مزدوری)</p>
                            <h3 className="text-3xl font-black text-blue-900">Rs {settlement.totalIncome.toLocaleString()}</h3>
                        </div>
                        <div className="bg-red-50 border border-red-200 p-6 rounded-2xl text-center">
                            <p className="text-red-800 font-bold mb-2">کل خرچہ (فارمان کی جیب سے)</p>
                            <h3 className="text-3xl font-black text-red-900">Rs {settlement.totalExpense.toLocaleString()}</h3>
                        </div>
                        <div className={`${settlement.netProfit >= 0 ? 'bg-emerald-50 border-emerald-200' : 'bg-orange-50 border-orange-200'} border p-6 rounded-2xl text-center`}>
                            <p className={`${settlement.netProfit >= 0 ? 'text-emerald-800' : 'text-orange-800'} font-bold mb-2`}>خالص منافع</p>
                            <h3 className={`text-3xl font-black ${settlement.netProfit >= 0 ? 'text-emerald-900' : 'text-orange-900'}`}>Rs {settlement.netProfit.toLocaleString()}</h3>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6">
                        {/* پارٹنر کا حصہ */}
                        <div className="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-indigo-500">
                            <h3 className="font-bold text-lg mb-4 text-gray-800 flex items-center gap-2">
                                <i data-lucide="user" className="text-indigo-500 w-5 h-5"></i> پارٹنر کا حصہ (50%)
                            </h3>
                            <div className="bg-gray-50 p-4 rounded-xl flex justify-between items-center">
                                <span className="text-gray-600">خالص منافع میں سے:</span>
                                <span className="font-black text-indigo-700 text-xl">Rs {settlement.partnerShare.toLocaleString()}</span>
                            </div>
                            <p className="text-xs text-gray-400 mt-3 text-center">یہ وہ رقم ہے جو پارٹنر کو اس مہینے دی جائے گی۔</p>
                        </div>

                        {/* فارمان برادرز کا حصہ */}
                        <div className="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-emerald-500">
                            <h3 className="font-bold text-lg mb-4 text-gray-800 flex items-center gap-2">
                                <i data-lucide="shield-check" className="text-emerald-500 w-5 h-5"></i> فارمان برادرز (آپ کی وصولی)
                            </h3>
                            <div className="space-y-3">
                                <div className="flex justify-between items-center border-b pb-2">
                                    <span className="text-gray-600 text-sm">منافع کا حصہ (50%):</span>
                                    <span className="font-bold text-emerald-700">Rs {settlement.farmanShare.toLocaleString()}</span>
                                </div>
                                <div className="flex justify-between items-center border-b pb-2">
                                    <span className="text-gray-600 text-sm">خرچے کی واپسی (جو آپ نے جیب سے دیا):</span>
                                    <span className="font-bold text-red-600">Rs {settlement.totalExpense.toLocaleString()}</span>
                                </div>
                                <div className="flex justify-between items-center pt-2 bg-emerald-50 p-3 rounded-lg">
                                    <span className="text-emerald-900 font-bold">کل وصولی:</span>
                                    <span className="font-black text-emerald-800 text-xl">Rs {settlement.farmanTotalReclaim.toLocaleString()}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function StatCard({ title, val, sub, icon, color }) {

                <div className="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-gray-100 relative overflow-hidden group">
                    <div className={`absolute top-0 right-0 w-1.5 md:w-2 h-full ${color}`}></div>
                    <div className="flex justify-between items-start">
                        <div>
                            <h3 className="text-gray-500 text-[10px] md:text-sm font-bold mb-1">{title}</h3>
                            <p className="text-xl md:text-2xl font-black text-gray-800">{val}</p>
                            {sub && <p className="text-[10px] md:text-xs text-gray-400 mt-1 md:mt-2">{sub}</p>}
                        </div>
                        <div className={`p-2 md:p-3 rounded-xl ${color} bg-opacity-10 text-gray-600`}>
                            <i data-lucide={icon} className="w-5 h-5 md:w-6 md:h-6"></i>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
