```html
<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فیکٹری مینجمنٹ سسٹم پرو</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Arabic', sans-serif; background-color: #f1f5f9; overflow-x: hidden; }
        
        /* پرنٹ کی سیٹنگز */
        @media print { 
            .no-print { display: none !important; } 
            body { background-color: white; } 
            .print-table { width: 100%; border-collapse: collapse; } 
            .print-table th, .print-table td { border: 1px solid #cbd5e1; padding: 12px; text-align: right; } 
            .sidebar-open { margin-right: 0 !important; }
        }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* کسٹم سکرول بار */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- فائر بیس کنفیگریشن ---
        const firebaseConfig = {
            apiKey: "AIzaSyCa8tzZCqksEMIngMoC0F0k4DhNgA0lkzs",
            authDomain: "factory-a3ca2.firebaseapp.com",
            projectId: "factory-a3ca2",
            storageBucket: "factory-a3ca2.firebasestorage.app",
            messagingSenderId: "523923910997",
            appId: "1:523923910997:web:6b7b1e93e80577092dbfdc"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'glove-factory-app';

        const gloveVarieties = ['سمال ہاف', 'میڈیم ہاف', 'لارج ہاف', 'سمال فل', 'میڈیم فل', 'لارج فل'];

        // ==========================================
        // 1. مرکزی ایپ کمپوننٹ (Main App)
        // ==========================================
        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activePage, setActivePage] = useState('dashboard'); // راؤٹنگ کے لیے اسٹیٹ
            const [selectedMonth, setSelectedMonth] = useState(new Date().toISOString().slice(0, 7));
            const [toast, setToast] = useState('');
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);

            // ڈیٹا اسٹیٹس
            const [dbData, setDbData] = useState({
                warehouse: [], yarn: [], production: [], packing: [], machine: [], salary: [], investment: []
            });

            // آتھنٹیکیشن
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => { setUser(u); setLoading(false); });
                return () => unsubscribe();
            }, []);

            // ڈیٹا فیچ کرنا
            useEffect(() => {
                if (!user) return;
                const collections = ['warehouse', 'yarn', 'production', 'packing', 'machine', 'salary', 'investment'];
                
                const unsubscribes = collections.map(col => {
                    return db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(col)
                        .onSnapshot(snap => {
                            const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            data.sort((a, b) => new Date(b.date) - new Date(a.date));
                            setDbData(prev => ({ ...prev, [col]: data }));
                        });
                });
                return () => unsubscribes.forEach(u => u());
            }, [user]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
            const showToast = (m) => { setToast(m); setTimeout(() => setToast(''), 3000); };

            // لاگ ان سکرین
            if (loading) return <div className="h-screen flex items-center justify-center"><div className="w-10 h-10 border-4 border-emerald-600 border-t-transparent rounded-full animate-spin"></div></div>;
            if (!user) return <LoginScreen auth={auth} />;

            // مینو کے آئٹمز
            const menuItems = [
                { id: 'dashboard', label: 'ڈیش بورڈ', icon: 'layout-dashboard' },
                { id: 'entry', label: 'ڈیٹا انٹری کریں', icon: 'plus-circle' },
                { id: 'records', label: 'تمام ریکارڈز دیکھیں', icon: 'list' },
                { id: 'investment', label: 'سرمایہ کاری', icon: 'briefcase' },
                { id: 'settings', label: 'ترتیبات', icon: 'settings' }
            ];

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* سائیڈ بار (Sidebar) */}
                    <aside className={`bg-emerald-900 text-white transition-all duration-300 flex flex-col no-print ${isSidebarOpen ? 'w-64' : 'w-20'} shadow-2xl z-30`}>
                        <div className="p-4 flex items-center justify-between border-b border-emerald-800">
                            {isSidebarOpen && <h1 className="font-bold text-lg whitespace-nowrap overflow-hidden">فیکٹری مینجمنٹ</h1>}
                            <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 bg-emerald-800 rounded-lg hover:bg-emerald-700">
                                <i data-lucide="menu"></i>
                            </button>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto py-4 space-y-1">
                            {menuItems.map(item => (
                                <button 
                                    key={item.id} 
                                    onClick={() => setActivePage(item.id)}
                                    className={`w-full flex items-center px-4 py-3 transition-colors ${activePage === item.id ? 'bg-emerald-700 border-r-4 border-emerald-400' : 'hover:bg-emerald-800 border-r-4 border-transparent'}`}
                                    title={item.label}
                                >
                                    <i data-lucide={item.icon} className="min-w-[24px]"></i>
                                    {isSidebarOpen && <span className="mr-3 whitespace-nowrap">{item.label}</span>}
                                </button>
                            ))}
                        </div>

                        <div className="p-4 border-t border-emerald-800">
                            <div className="flex items-center gap-3">
                                <img src={user.photoURL || 'https://via.placeholder.com/40'} className="w-10 h-10 rounded-full border-2 border-emerald-500" />
                                {isSidebarOpen && (
                                    <div className="overflow-hidden">
                                        <p className="text-sm font-bold truncate">{user.displayName || 'یوزر'}</p>
                                        <button onClick={() => auth.signOut()} className="text-xs text-emerald-300 hover:text-white">لاگ آؤٹ کریں</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </aside>

                    {/* مرکزی حصہ (Main Content Area) */}
                    <div className="flex-1 flex flex-col overflow-hidden relative">
                        {/* ٹاپ بار */}
                        <header className="bg-white shadow-sm p-4 flex justify-between items-center z-20 no-print">
                            <h2 className="text-xl font-bold text-gray-800">
                                {menuItems.find(m => m.id === activePage)?.label}
                            </h2>
                            <div className="flex items-center gap-3">
                                <input type="month" value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)} className="border border-gray-300 px-3 py-2 rounded-lg text-sm outline-none focus:border-emerald-500 bg-gray-50" />
                                <button onClick={() => window.print()} className="bg-gray-100 p-2 rounded-lg hover:bg-gray-200 text-gray-700" title="پرنٹ کریں">
                                    <i data-lucide="printer"></i>
                                </button>
                            </div>
                        </header>

                        {/* پیج کا مواد (Page Content Switcher) */}
                        <main className="flex-1 overflow-y-auto p-4 md:p-6 bg-gray-50 print:bg-white print:p-0">
                            <div className="fade-in max-w-6xl mx-auto">
                                {activePage === 'dashboard' && <DashboardPage dbData={dbData} month={selectedMonth} />}
                                {activePage === 'entry' && <EntryPage db={db} user={user} appId={appId} showToast={showToast} gloveVarieties={gloveVarieties} />}
                                {activePage === 'records' && <RecordsPage dbData={dbData} db={db} user={user} appId={appId} month={selectedMonth} showToast={showToast} setActivePage={setActivePage} />}
                                {activePage === 'investment' && <InvestmentPage dbData={dbData} db={db} user={user} appId={appId} showToast={showToast} />}
                                {activePage === 'settings' && <div className="p-8 text-center text-gray-500 bg-white rounded-2xl border">مزید ترتیبات جلد آرہی ہیں...</div>}
                            </div>
                        </main>
                    </div>

                    {/* ٹوسٹ میسج */}
                    {toast && <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl z-50 text-sm font-bold flex items-center gap-2"><i data-lucide="check-circle" className="text-emerald-400 w-5 h-5"></i> {toast}</div>}
                </div>
            );
        }

        // ==========================================
        // 2. لاگ ان سکرین (Login Screen)
        // ==========================================
        function LoginScreen({ auth }) {
            const [errorMsg, setErrorMsg] = useState('');

            const loginWithGoogle = () => {
                setErrorMsg('');
                const provider = new firebase.auth.GoogleAuthProvider();
                auth.signInWithPopup(provider).catch(err => {
                    if (err.code === 'auth/unauthorized-domain') {
                        setErrorMsg('اس ونڈو (پریویو) کی ڈومین کو فائر بیس میں اجازت نہیں ہے۔ گٹ ہب پر یہ بالکل ٹھیک چلے گا۔');
                    } else if (err.code === 'auth/popup-blocked') {
                        setErrorMsg('براؤزر نے لاگ ان ونڈو کو بلاک کر دیا ہے۔');
                    } else {
                        setErrorMsg(err.message);
                    }
                });
            };

            const loginAnonymously = () => {
                auth.signInAnonymously().catch(err => setErrorMsg(err.message));
            };

            return (
                <div className="h-screen flex flex-col items-center justify-center bg-gray-100 p-4">
                    <div className="bg-white p-10 rounded-3xl shadow-xl text-center max-w-md w-full border-t-8 border-emerald-600">
                        <div className="w-20 h-20 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-4 border border-emerald-100">
                            <i data-lucide="factory" className="text-emerald-600 w-10 h-10"></i>
                        </div>
                        <h1 className="text-2xl font-black text-gray-800 mb-2">فیکٹری مینجمنٹ ٹول</h1>
                        <p className="text-gray-500 mb-6 text-sm">اپنے محفوظ سسٹم میں داخل ہونے کے لیے لاگ ان کریں</p>
                        
                        {errorMsg && (
                            <div className="mb-4 bg-red-50 border border-red-200 text-red-600 text-xs p-3 rounded-lg font-bold">
                                {errorMsg}
                            </div>
                        )}

                        <button onClick={loginWithGoogle} className="w-full flex items-center justify-center gap-3 bg-white border-2 border-gray-200 py-3 rounded-xl font-bold text-gray-700 hover:bg-gray-50 hover:border-gray-300 transition shadow-sm active:scale-95">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-6 h-6" /> 
                            گوگل اکاؤنٹ سے لاگ ان کریں
                        </button>
                        
                        <div className="mt-6 pt-4 border-t border-gray-100">
                            <button onClick={loginAnonymously} className="text-sm text-gray-500 hover:text-emerald-700 transition font-bold underline">
                                صرف اس ونڈو میں ٹیسٹ کرنے کے لیے عارضی لاگ ان کریں
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 3. ڈیش بورڈ پیج (Dashboard Page)
        // ==========================================
        function DashboardPage({ dbData, month }) {
            const stats = useMemo(() => {
                const filterMonth = (list) => list.filter(i => i.date?.startsWith(month));
                const mProd = filterMonth(dbData.production);
                const mPack = filterMonth(dbData.packing);
                const mMach = filterMonth(dbData.machine);
                const mSal = filterMonth(dbData.salary);
                
                return {
                    whBags: dbData.warehouse.reduce((s, i) => s + (i.bags || 0), 0) - dbData.yarn.reduce((s, i) => s + (i.bags || 0), 0),
                    whWeight: dbData.warehouse.reduce((s, i) => s + (i.totalWeight || 0), 0) - dbData.yarn.reduce((s, i) => s + (i.weight || 0), 0),
                    prodDoz: mProd.reduce((s, i) => s + (i.dozens || 0), 0),
                    prodWeight: mProd.reduce((s, i) => s + (i.weight || 0), 0),
                    packDoz: mPack.reduce((s, i) => s + (i.dozens || 0), 0),
                    totalExp: mPack.reduce((s, i) => s + (i.cost || 0), 0) + mMach.reduce((s, i) => s + (i.cost || 0), 0) + mSal.reduce((s, i) => s + (i.amount || 0), 0),
                    totalInv: dbData.investment.reduce((s, i) => s + (i.amount || 0), 0)
                };
            }, [dbData, month]);

            return (
                <div className="space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <StatCard title="گودام سٹاک" val={`${stats.whBags} بورے`} sub={`${stats.whWeight} کلو`} icon="home" color="bg-indigo-600" />
                        <StatCard title="ماہانہ پروڈکشن" val={`${stats.prodDoz} درجن`} sub={`${stats.prodWeight} کلو`} icon="box" color="bg-emerald-600" />
                        <StatCard title="ماہانہ پیکنگ" val={`${stats.packDoz} درجن`} sub="تیار مال" icon="package" color="bg-purple-600" />
                        <StatCard title="ماہانہ خرچہ" val={`Rs ${stats.totalExp.toLocaleString()}`} sub="بل + تنخواہ + پیکنگ" icon="trending-down" color="bg-red-600" />
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                            <h3 className="font-bold text-lg mb-4 flex items-center gap-2"><i data-lucide="pie-chart" className="text-gray-400"></i> فیکٹری کی مجموعی پوزیشن</h3>
                            <div className="space-y-4">
                                <div className="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                                    <span className="text-gray-600">کل سرمایہ کاری</span>
                                    <span className="font-bold text-emerald-700">Rs {stats.totalInv.toLocaleString()}</span>
                                </div>
                                <div className="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                                    <span className="text-gray-600">ان پیک دستانے (اندازاً)</span>
                                    <span className="font-bold text-orange-600">{(stats.prodDoz - stats.packDoz).toFixed(2)} درجن</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 4. انٹری پیج (Data Entry Page)
        // ==========================================
        function EntryPage({ db, user, appId, showToast, gloveVarieties }) {
            const [entryType, setEntryType] = useState('production');

            const handleSave = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData.entries());
                const numFields = ['bags', 'weight', 'weightPerBag', 'dozens', 'cost', 'amount', 'totalWeight'];
                Object.keys(data).forEach(k => { if (numFields.includes(k)) data[k] = parseFloat(data[k]) || 0; });
                if (entryType === 'warehouse') data.totalWeight = (data.bags || 0) * (data.weightPerBag || 30);

                try {
                    await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(entryType).add({ ...data, timestamp: Date.now() });
                    showToast("ریکارڈ محفوظ ہو گیا!");
                    e.target.reset();
                } catch (err) { showToast("ایرر: محفوظ نہیں ہو سکا"); }
            };

            const entryOptions = [
                { id: 'production', label: 'پروڈکشن', color: 'emerald' },
                { id: 'warehouse', label: 'گودام آمد', color: 'indigo' },
                { id: 'yarn', label: 'فیکٹری آمد', color: 'amber' },
                { id: 'packing', label: 'پیکنگ بل', color: 'purple' },
                { id: 'machine', label: 'مشین خرچہ', color: 'red' },
                { id: 'salary', label: 'تنخواہ', color: 'blue' }
            ];

            return (
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 max-w-3xl mx-auto">
                    <div className="flex flex-wrap gap-2 mb-8 justify-center bg-gray-50 p-2 rounded-xl border">
                        {entryOptions.map(t => (
                            <button key={t.id} onClick={() => setEntryType(t.id)} className={`px-4 py-2 rounded-lg text-sm font-bold flex-1 text-center transition-all ${entryType === t.id ? `bg-${t.color}-600 text-white shadow-md` : 'text-gray-500 hover:bg-gray-200'}`}>
                                {t.label}
                            </button>
                        ))}
                    </div>

                    <form onSubmit={handleSave} className="space-y-6">
                        <div>
                            <label className="text-sm font-bold text-gray-500 mb-1 block">تاریخ درج کریں</label>
                            <input type="date" name="date" required defaultValue={new Date().toISOString().split('T')[0]} className="w-full p-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-emerald-500 outline-none" />
                        </div>

                        {entryType === 'warehouse' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <input type="number" name="bags" placeholder="کتنے بورے آئے؟" required className="w-full p-4 border border-gray-300 rounded-xl" />
                                <input type="number" name="weightPerBag" placeholder="فی بوری وزن (کلو)" defaultValue="30" className="w-full p-4 border border-gray-300 rounded-xl" />
                            </div>
                        )}

                        {(entryType === 'production' || entryType === 'packing') && (
                            <div className="space-y-4">
                                <select name="variety" className="w-full p-4 border border-gray-300 rounded-xl bg-gray-50">
                                    {gloveVarieties.map(v => <option key={v} value={v}>{v}</option>)}
                                </select>
                                <div className="grid grid-cols-2 gap-4">
                                    <input type="number" name="dozens" placeholder="درجن" required className="w-full p-4 border border-gray-300 rounded-xl" />
                                    <input type="number" name={entryType === 'production' ? 'weight' : 'cost'} placeholder={entryType === 'production' ? 'وزن' : 'خرچہ'} required className="w-full p-4 border border-gray-300 rounded-xl" />
                                </div>
                            </div>
                        )}

                        {entryType === 'yarn' && (
                            <div className="grid grid-cols-2 gap-4">
                                <input type="number" name="bags" placeholder="بورے" required className="w-full p-4 border border-gray-300 rounded-xl" />
                                <input type="number" name="weight" placeholder="کل وزن" required className="w-full p-4 border border-gray-300 rounded-xl" />
                            </div>
                        )}

                        {entryType === 'machine' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <input type="number" name="cost" placeholder="رقم" required className="w-full p-4 border border-gray-300 rounded-xl" />
                                <input type="text" name="details" placeholder="تفصیل" required className="w-full p-4 border border-gray-300 rounded-xl" />
                            </div>
                        )}

                        {entryType === 'salary' && (
                            <div className="space-y-4">
                                <input type="text" name="workerName" placeholder="کاریگر کا نام" required className="w-full p-4 border border-gray-300 rounded-xl" />
                                <div className="grid grid-cols-2 gap-4">
                                    <input type="number" name="amount" placeholder="رقم" required className="w-full p-4 border border-gray-300 rounded-xl" />
                                    <select name="salaryType" className="w-full p-4 border border-gray-300 rounded-xl"><option value="تنخواہ">تنخواہ</option><option value="ایڈوانس">ایڈوانس</option></select>
                                </div>
                            </div>
                        )}

                        <button type="submit" className="w-full bg-emerald-800 text-white p-4 rounded-xl font-bold shadow-lg hover:bg-emerald-900 transition active:scale-95 flex justify-center items-center gap-2">
                            <i data-lucide="save" className="w-5 h-5"></i> ڈیٹا محفوظ کریں
                        </button>
                    </form>
                </div>
            );
        }

        // ==========================================
        // 5. ریکارڈز پیج (Records Page)
        // ==========================================
        function RecordsPage({ dbData, db, user, appId, month, showToast }) {
            const [viewType, setViewType] = useState('production');

            const currentList = useMemo(() => {
                const list = dbData[viewType] || [];
                return (viewType === 'warehouse' || viewType === 'investment') ? list : list.filter(i => i.date?.startsWith(month));
            }, [viewType, dbData, month]);

            const handleDelete = async (id) => {
                if(window.confirm("کیا آپ ڈیلیٹ کرنا چاہتے ہیں؟")) {
                    await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(viewType).doc(id).delete();
                    showToast("ڈیلیٹ ہو گیا");
                }
            };

            return (
                <div className="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-gray-100">
                    <div className="mb-6 no-print">
                        <select value={viewType} onChange={e => setViewType(e.target.value)} className="w-full md:w-auto p-3 border border-gray-300 rounded-xl bg-gray-50 outline-none font-bold text-emerald-900">
                            <option value="production">پروڈکشن کا ریکارڈ</option>
                            <option value="warehouse">گودام کا ریکارڈ</option>
                            <option value="yarn">فیکٹری آمد ریکارڈ</option>
                            <option value="packing">پیکنگ بل ریکارڈ</option>
                            <option value="machine">مشین خرچہ ریکارڈ</option>
                            <option value="salary">تنخواہ کھاتہ</option>
                        </select>
                    </div>

                    <div className="overflow-x-auto rounded-xl border border-gray-200">
                        <table className="w-full text-right print-table">
                            <thead className="bg-gray-100 border-b border-gray-200">
                                <tr>
                                    <th className="p-4 text-sm font-bold text-gray-700">تاریخ</th>
                                    {viewType === 'production' && <><th className="p-4 text-sm font-bold text-gray-700">ورائٹی</th><th className="p-4 text-sm font-bold text-gray-700">درجن</th><th className="p-4 text-sm font-bold text-gray-700">وزن</th></>}
                                    {viewType === 'warehouse' && <><th className="p-4 text-sm font-bold text-gray-700">بورے</th><th className="p-4 text-sm font-bold text-gray-700">وزن</th></>}
                                    {viewType === 'yarn' && <><th className="p-4 text-sm font-bold text-gray-700">بورے</th><th className="p-4 text-sm font-bold text-gray-700">وزن</th></>}
                                    {viewType === 'packing' && <><th className="p-4 text-sm font-bold text-gray-700">ورائٹی</th><th className="p-4 text-sm font-bold text-gray-700">درجن</th><th className="p-4 text-sm font-bold text-gray-700">رقم</th></>}
                                    {viewType === 'machine' && <><th className="p-4 text-sm font-bold text-gray-700">تفصیل</th><th className="p-4 text-sm font-bold text-gray-700">رقم</th></>}
                                    {viewType === 'salary' && <><th className="p-4 text-sm font-bold text-gray-700">نام</th><th className="p-4 text-sm font-bold text-gray-700">رقم</th></>}

        // ==========================================
        // 6. سرمایہ کاری پیج (Investment Page)
        // ==========================================
        function InvestmentPage({ dbData, db, user, appId, showToast }) {
            const handleSave = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const data = { date: formData.get('date'), details: formData.get('details'), amount: parseFloat(formData.get('amount')) || 0 };
                try {
                    await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('investment').add({ ...data, timestamp: Date.now() });
                    showToast("سرمایہ محفوظ ہو گیا!");
                    e.target.reset();
                } catch (err) { showToast("ایرر آیا ہے"); }
            };

            const total = dbData.investment.reduce((s, i) => s + (i.amount || 0), 0);

            return (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div className="lg:col-span-1 bg-white p-6 rounded-2xl shadow-sm border h-fit no-print">
                        <h3 className="font-bold text-lg mb-4 text-emerald-900 border-b pb-2">نیا سرمایہ درج کریں</h3>
                        <form onSubmit={handleSave} className="space-y-4">
                            <input type="date" name="date" required defaultValue={new Date().toISOString().split('T')[0]} className="w-full p-3 border rounded-xl bg-gray-50" />
                            <input type="text" name="details" placeholder="سرمایہ کہاں سے آیا یا کہاں لگا؟" required className="w-full p-3 border rounded-xl" />
                            <input type="number" name="amount" placeholder="رقم درج کریں" required className="w-full p-3 border rounded-xl" />
                            <button type="submit" className="w-full bg-emerald-700 text-white p-3 rounded-xl font-bold hover:bg-emerald-800">محفوظ کریں</button>
                        </form>
                    </div>
                    <div className="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border">
                        <div className="flex justify-between items-center mb-6 border-b pb-2">
                            <h3 className="font-bold text-lg text-gray-800">سرمایہ کاری کا ریکارڈ</h3>
                            <span className="bg-emerald-100 text-emerald-800 py-1 px-3 rounded-full font-bold text-sm">کل: Rs {total.toLocaleString()}</span>
                        </div>
                        <table className="w-full text-right print-table">
                            <thead className="bg-gray-50"><tr><th className="p-3">تاریخ</th><th className="p-3">تفصیل</th><th className="p-3">رقم</th><th className="no-print"></th></tr></thead>
                            <tbody>
                                {dbData.investment.map(item => (
                                    <tr key={item.id} className="border-b">
                                        <td className="p-3 text-sm">{item.date}</td>
                                        <td className="p-3 text-sm">{item.details}</td>
                                        <td className="p-3 font-bold text-emerald-600">Rs {item.amount.toLocaleString()}</td>
                                        <td className="p-3 no-print text-left"><button onClick={() => { if(window.confirm('ڈیلیٹ؟')) db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('investment').doc(item.id).delete() }} className="text-red-400 hover:text-red-600"><i data-lucide="trash-2" className="w-4 h-4"></i></button></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // مددگار کمپوننٹ (Helper Card)
        function StatCard({ title, val, sub, icon, color }) {
            return (
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 relative overflow-hidden group">
                    <div className={`absolute top-0 right-0 w-2 h-full ${color}`}></div>
                    <div className="flex justify-between items-start">
                        <div>
                            <h3 className="text-gray-500 text-sm font-bold mb-1">{title}</h3>
                            <p className="text-2xl font-black text-gray-800">{val}</p>
                            {sub && <p className="text-xs text-gray-400 mt-2">{sub}</p>}
                        </div>
                        <div className={`p-3 rounded-xl ${color} bg-opacity-10 text-gray-600 group-hover:scale-110 transition-transform`}>
                            <i data-lucide={icon} className="w-6 h-6"></i>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
