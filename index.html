            const [packingData, setPackingData] = useState([]);
            const [machineData, setMachineData] = useState([]);
            const [salaryData, setSalaryData] = useState([]);
            const [investmentData, setInvestmentData] = useState([]);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => { setUser(u); setLoading(false); });

            }, []);

                    packing: setPackingData, machine: setMachineData, salary: setSalaryData, investment: setInvestmentData

                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData.entries());
                const numFields = ['bags', 'weight', 'weightPerBag', 'dozens', 'cost', 'amount', 'totalWeight'];
                Object.keys(data).forEach(k => { if (numFields.includes(k)) data[k] = parseFloat(data[k]) || 0; });
                if (entryType === 'warehouse') data.totalWeight = (data.bags || 0) * (data.weightPerBag || 30);

                try {
                    const colRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(entryType);
                    if (editingItem) { await colRef.doc(editingItem.id).update(data); setEditingItem(null); }

                const mMach = machineData.filter(i => i.date?.startsWith(selectedMonth));
                const mSal = salaryData.filter(i => i.date?.startsWith(selectedMonth));
                
                return {

                    prodDoz: mProd.reduce((s, i) => s + (i.dozens || 0), 0),

                };

                return (entryType === 'warehouse' || entryType === 'investment') ? list : list.filter(i => i.date?.startsWith(selectedMonth));
            }, [entryType, warehouseData, yarnData, productionData, packingData, machineData, salaryData, investmentData, selectedMonth]);

            const showToast = (m) => { setToast(m); setTimeout(() => setToast(''), 3000); };

                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-5 h-5" /> گوگل لاگ ان
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen">
                    <header className="bg-emerald-800 text-white p-4 shadow-lg flex justify-between items-center sticky top-0 z-20 no-print">

                            <h1 className="text-lg font-bold">فیکٹری مینجمنٹ</h1>

                        </div>

                            </button>

                                    <h2 className="text-lg font-bold text-gray-700">رپورٹ</h2>
                                    <button onClick={() => window.print()} className="bg-gray-800 text-white px-4 py-2 rounded-lg flex items-center gap-2"><i data-lucide="printer" className="w-4 h-4"></i> پرنٹ</button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                    <StatCard title="کل سرمایہ" val={`Rs ${stats.totalInv.toLocaleString()}`} color="border-emerald-600" text="text-emerald-700" />
                                    <StatCard title="گودام سٹاک" val={`${stats.whBags} بورے`} color="border-indigo-600" text="text-indigo-700" />
                                    <StatCard title="پروڈکشن" val={`${stats.prodDoz} درجن`} color="border-amber-600" text="text-amber-700" />
                                    <StatCard title="ماہانہ خرچہ" val={`Rs ${stats.totalExp.toLocaleString()}`} color="border-red-600" text="text-red-700" />
                                </div>
                            </div>
                        )}

                        {activeTab === 'entry' && (

                                        <button key={t} onClick={() => setEntryType(t)} className={`px-4 py-2 rounded-full text-xs font-bold ${entryType === t ? 'bg-emerald-600 text-white shadow-lg' : 'bg-gray-100 text-gray-500'}`}>
                                            {t === 'investment' ? 'سرمایہ' : t === 'warehouse' ? 'گودام' : t === 'yarn' ? 'فیکٹری آمد' : t === 'production' ? 'پروڈکشن' : t === 'packing' ? 'پیکنگ' : t === 'machine' ? 'مشین' : 'تنخواہ'}
                                        </button>

                                    {entryType === 'packing' && <><select name="variety" defaultValue={editingItem?.variety || 'سمال ہاف'} className="w-full p-4 border rounded-xl">{gloveVarieties.map(v => <option key={v} value={v}>{v}</option>)}</select><input type="number" name="dozens" placeholder="درجن" required className="w-full p-4 border rounded-xl" /><input type="number" name="cost" placeholder="خرچہ" required className="w-full p-4 border rounded-xl" /></>}
                                    {entryType === 'machine' && <><input type="number" name="cost" placeholder="رقم" required className="w-full p-4 border rounded-xl" /><input type="text" name="details" placeholder="تفصیل" required className="w-full p-4 border rounded-xl" /></>}
                                    {entryType === 'salary' && <><input type="text" name="workerName" placeholder="نام" required className="w-full p-4 border rounded-xl" /><input type="number" name="amount" placeholder="رقم" required className="w-full p-4 border rounded-xl" /><select name="salaryType" className="w-full p-4 border rounded-xl"><option value="تنخواہ">تنخواہ</option><option value="ایڈوانس">ایڈوانس</option></select></>}
                                    {entryType === 'yarn' && <><input type="number" name="bags" placeholder="بورے" required className="w-full p-4 border rounded-xl" /><input type="number" name="weight" placeholder="وزن" required className="w-full p-4 border rounded-xl" /></>}
                                    <button type="submit" className="w-full bg-emerald-700 text-white p-4 rounded-2xl font-bold shadow-lg hover:bg-emerald-800 transition">محفوظ کریں</button>

                                        <option value="investment">سرمایہ کاری</option><option value="warehouse">گودام</option><option value="yarn">فیکٹری آمد</option><option value="production">پروڈکشن</option><option value="packing">پیکنگ</option><option value="machine">مشین</option><option value="salary">تنخواہ</option>
                                    </select>
                                    <button onClick={() => window.print()} className="p-2 bg-gray-100 rounded-xl"><i data-lucide="printer" className="w-5 h-5"></i></button>

                                                {entryType === 'investment' && <><th className="p-3 text-xs font-bold">تفصیل</th><th className="p-3 text-xs font-bold">رقم</th></>}
                                                {entryType === 'production' && <><th className="p-3 text-xs font-bold">ورائٹی</th><th className="p-3 text-xs font-bold">درجن</th><th className="p-3 text-xs font-bold">وزن</th></>}
                                                {entryType === 'warehouse' && <><th className="p-3 text-xs font-bold">بورے</th><th className="p-3 text-xs font-bold">وزن</th></>}
                                                {entryType === 'packing' && <><th className="p-3 text-xs font-bold">ورائٹی</th><th className="p-3 text-xs font-bold">درجن</th><th className="p-3 text-xs font-bold">رقم</th></>}
                                                {entryType === 'machine' && <><th className="p-3 text-xs font-bold">تفصیل</th><th className="p-3 text-xs font-bold">رقم</th></>}
                                                {entryType === 'salary' && <><th className="p-3 text-xs font-bold">نام</th><th className="p-3 text-xs font-bold">رقم</th></>}
                                                <th className="p-3 text-xs font-bold no-print">ایکشن</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {currentList.map(item => (
                                                <tr key={item.id} className="border-b hover:bg-gray-50 transition">
                                                    <td className="p-3 text-xs">{item.date}</td>
                                                    {entryType === 'investment' && <><td className="p-3 text-xs">{item.details}</td><td className="p-3 font-bold text-emerald-600">Rs {item.amount}</td></>}
                                                    {entryType === 'production' && <><td className="p-3 text-xs">{item.variety}</td><td className="p-3 font-bold">{item.dozens}</td><td className="p-3 text-xs">{item.weight} کلو</td></>}
                                                    {entryType === 'warehouse' && <><td className="p-3 font-bold">{item.bags}</td><td className="p-3 text-xs">{item.totalWeight} کلو</td></>}
                                                    {entryType === 'packing' && <><td className="p-3 text-xs">{item.variety}</td><td className="p-3 text-xs font-bold">{item.dozens}</td><td className="p-3 font-bold text-red-600">Rs {item.cost}</td></>}
                                                    {entryType === 'machine' && <><td className="p-3 text-xs">{item.details}</td><td className="p-3 font-bold text-red-600">Rs {item.cost}</td></>}
                                                    {entryType === 'salary' && <><td className="p-3 text-xs font-bold">{item.workerName}</td><td className="p-3 font-bold text-red-600">Rs {item.amount}</td></>}
                                                    <td className="p-3 no-print flex gap-3">
                                                        <button onClick={() => { setEditingItem(item); setActiveTab('entry'); }} className="text-blue-500"><i data-lucide="edit-2" className="w-4 h-4"></i></button>
                                                        <button onClick={() => db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(entryType).doc(item.id).delete()} className="text-red-400"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    {toast && <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-8 py-3 rounded-full shadow-2xl z-50 text-sm">{toast}</div>}
                </div>
            );
        }

        function StatCard({ title, val, color, text }) {
            return (
                <div className={`bg-white p-6 rounded-2xl shadow-md border-r-8 ${color}`}>
                    <h3 className="text-gray-400 text-xs font-bold uppercase">{title}</h3>
                    <p className={`text-2xl font-black ${text} mt-2`}>{val}</p>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
